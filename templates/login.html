<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Outlook 邮件管理</title>
    <link rel="icon" type="image/png" href="/img/ico.png">
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        body { margin: 0; }
    </style>
</head>
<body>
    <div id="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">📬</div>
                <h1>Outlook 邮件管理</h1>
                <p>安全登录以管理您的邮箱账号</p>
            </div>

            <div id="errorMessage" class="form-error" style="display:none; margin-bottom:1rem; padding:0.7rem 1rem; background:rgba(192,57,43,0.08); border:1px solid rgba(192,57,43,0.2); border-radius:var(--radius-sm);"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="password">登录密码</label>
                    <input type="password" class="form-input" id="password" placeholder="请输入密码" autofocus required>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%; padding:0.7rem; font-size:0.95rem;">登 录</button>
            </form>

            <p style="text-align:center; font-size:0.72rem; color:var(--text-muted); margin-top:1.5rem;">
                Outlook 邮件管理工具 · 安全访问
            </p>
        </div>
    </div>

    <script src="/static/js/i18n.js"></script>
    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');
            const pickApiMessage = window.pickApiMessage || ((payload, zh) => zh);
            const translateText = window.translateAppText || ((text) => text);

            if (!password) {
                errorMessage.textContent = translateText('请输入密码');
                errorMessage.style.display = 'block';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = translateText('登录中...');
            errorMessage.style.display = 'none';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await response.json();

                if (data.success) {
                    window.location.href = '/';
                } else {
                    const msg = (data.error && typeof data.error === 'object')
                        ? pickApiMessage(data.error, '登录失败', 'Login failed')
                        : translateText(data.error || '登录失败');
                    errorMessage.textContent = msg;
                    errorMessage.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = translateText('登 录');
                }
            } catch (error) {
                errorMessage.textContent = translateText('网络错误，请重试');
                errorMessage.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = translateText('登 录');
            }
        }

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
